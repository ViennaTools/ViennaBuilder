on:
  push:
  workflow_dispatch:

name: 🐳 Build & Publish Docker Image

jobs:
  build-container:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: stock
          - name: suite
            suite: "true"
          - name: python
            python: "true"
          - name: suite-python
            python: "true"
            suite: "true"

    name: "🐳 Build Container (🐍: ${{ matrix.python || 'false' }}, 🧰: ${{ matrix.suite || 'false' }})"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐋 Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ♻️ Publish Images
        run: |
          docker buildx build --tag vienna-builder --build-arg SUITE="${{ matrix.suite || 'false' }}" --build-arg PYTHON="${{ matrix.python || 'false' }}" --load .
          docker image tag vienna-builder ghcr.io/viennatools/vienna-builder:${{ matrix.name }}
          docker push ghcr.io/viennatools/vienna-builder:${{ matrix.name }}

  build-container-cuda:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        include:
          # Packaging
          - name: cuda-python
            python: "true"
            install_cuda: "true"
          # Testing
          - name: cuda-suite-python
            python: "true"
            suite: "true"
            install_cuda: "true"
          # Packaging without CUDA
          - name: cuda-python-nocuda
            python: "true"
            install_cuda: "false"
          # Testing without CUDA
          - name: cuda-suite-python-nocuda
            python: "true"
            suite: "true"
            install_cuda: "false"

    name: "🐳 Build CUDA Container (🐍: ${{ matrix.python || 'false' }}, 🧰: ${{ matrix.suite || 'false' }})"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐋 Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ♻️ Publish CUDA Images
        run: |
          docker buildx build --tag vienna-builder-cuda --build-arg SUITE="${{ matrix.suite || 'false' }}" --build-arg PYTHON="${{ matrix.python || 'false' }}" --build-arg INSTALL_CUDA="${{ matrix.install_cuda || 'false' }}" --load -f Dockerfile.cuda .
          docker image tag vienna-builder-cuda ghcr.io/viennatools/vienna-builder:${{ matrix.name }}
          docker push ghcr.io/viennatools/vienna-builder:${{ matrix.name }}
